<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no" />
  <title>Showroom Display</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      -webkit-tap-highlight-color: transparent;
    }

    html, body {
      width: 100%;
      height: 100%;
      overflow: hidden;
      background: #000;
      touch-action: pan-y;
      font-family: sans-serif;
    }

    .slider {
      display: flex;
      width: 300vw;
      height: 100vh;
      transition: transform 0.3s ease;
    }

    .slide {
      width: 100vw;
      height: 100vh;
      flex-shrink: 0;
      background: #000;
    }

    .slide img {
      width: 100%;
      height: 100%;
      object-fit: contain;
      display: block;
      background: #000;
    }

    .dots {
      position: fixed;
      bottom: 18px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 8px;
      z-index: 10;
    }

    .dot {
      width: 10px;
      height: 10px;
      border-radius: 50%;
      background: rgba(255,255,255,0.35);
    }

    .dot.active {
      background: rgba(255,255,255,0.95);
    }
  </style>
</head>
<body>
  <div class="slider" id="slider">
    <div class="slide"><img src="테스트1.jpg" alt="slide 1"></div>
    <div class="slide"><img src="테스트2.jpg" alt="slide 2"></div>
    <div class="slide"><img src="테스트3.jpg" alt="slide 3"></div>
  </div>

  <div class="dots">
    <div class="dot active"></div>
    <div class="dot"></div>
    <div class="dot"></div>
  </div>

  <script>
    const slider = document.getElementById("slider");
    const dots = document.querySelectorAll(".dot");

    let current = 0;
    let startX = 0;
    let currentX = 0;
    let isDragging = false;

    function updateSlider() {
      slider.style.transform = `translateX(-${current * 100}vw)`;
      dots.forEach((dot, index) => {
        dot.classList.toggle("active", index === current);
      });
    }

    slider.addEventListener("touchstart", (e) => {
      startX = e.touches[0].clientX;
      isDragging = true;
    });

    slider.addEventListener("touchmove", (e) => {
      if (!isDragging) return;
      currentX = e.touches[0].clientX;
    });

    slider.addEventListener("touchend", () => {
      if (!isDragging) return;

      const diff = startX - currentX;

      if (diff > 50 && current < 2) {
        current++;
      } else if (diff < -50 && current > 0) {
        current--;
      }

      updateSlider();
      isDragging = false;
    });
  </script>
</body>
</html>
